<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Availability Table</title>
  <link rel="stylesheet" href="styles/style11.css">
</head>

<body>
  <table>
    <thead>
      <tr class="sharp">
        <th></th>
        <th>Monday</th>
        <th>Tuesday</th>
        <th>Wednesday</th>
        <th>Thursday</th>
        <th>Friday</th>
      </tr>
    </thead>
    <tbody>
      <tr class="half">
        <th class="time">8:00AM</th>
        <td class="available-0">0</td>
        <td class="available-3">3</td>
        <td class="available-2">2</td>
        <td class="available-1">1</td>
        <td class="available-4">4</td>
      </tr>
      <tr class="sharp">
        <th class="time">9:00AM</th>
        <td class="available-1">1</td>
        <td class="available-0">0</td>
        <td class="available-2">2</td>
        <td class="available-4">4</td>
        <td class="available-5">5</td>
      </tr>
      <tr class="half">
        <th class="time">10:00AM</th>
        <td class="available-2">2</td>
        <td class="available-3">3</td>
        <td class="available-4">4</td>
        <td class="available-0">0</td>
        <td class="available-1">1</td>
      </tr>
      <tr class="sharp">
        <th class="time">11:00AM</th>
        <td class="available-0">0</td>
        <td class="available-1">1</td>
        <td class="available-3">3</td>
        <td class="available-2">2</td>
        <td class="available-5">5</td>
      </tr>
      <tr class="half">
        <th class="time">12:00PM</th>
        <td class="available-2">2</td>
        <td class="available-1">1</td>
        <td class="available-0">0</td>
        <td class="available-4">4</td>
        <td class="available-3">3</td>
      </tr>
    </tbody>
  </table>
  <div id="legend"><span>Availability</span>
    <div id="legend-gradient"></div>
  </div>

</body>

</html>
