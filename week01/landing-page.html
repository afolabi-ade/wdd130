<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Product Landing Page</title>

</head>

<body>

</body>
<header id="header">
  <img src="https://global.toyota/pages/global_toyota/mobility/toyota-brand/emblem_001.jpg"
    id="header-img" width="100">
  <nav id="nav-bar">
    <a class="nav-link" href="#header-img">Header-img</a>
    <a class="nav-link" href="#video">Video</a>
    <a class="nav-link" href="#submit">Submit</a>
  </nav>
</header>
<section>
  <iframe id="video" width="560" height="315"
    src="https://www.youtube.com/embed/yjSzpbE31KY?si=CxnUIlURt3Q6RJG4" title="YouTube video player"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"

</section>
<form id="form" action="https://www.freecodecamp.org/email-submit" method="POST">
  <input id="email" type="email" name="email" placeholder="Enter an email" required>
  <input type="submit" id="submit" value="Submit">
</form>
